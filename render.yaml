services:
  # API server
  - type: web
    name: wrkr-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build && npm run db:generate
    startCommand: npm run db:migrate && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wrkr-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          name: wrkr-frontend
          type: web
          property: host
      - key: RESEND_API_KEY
        sync: false  # set manually in Render dashboard

  # React SPA
  - type: web
    name: wrkr-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self'"

databases:
  - name: wrkr-db
    databaseName: wrkr
    plan: free
